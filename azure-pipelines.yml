trigger:
  batch: true
  branches:
    include:
      - "master"

variables:
  - name: SolutionBaseName
    value: SFA.DAS.Campaign
  - name: BuildConfiguration
    value: release
  - name: BuildPlatform
    value: any cpu
  - group: RELEASE Management Resources
  - group: RELEASE das-campaign
  - name: Deploy
    value: $[or(eq(variables['Build.SourceBranch'], 'refs/heads/master'), eq(variables['Build.Reason'], 'Manual'), eq(variables['Build.Reason'], 'PullRequest'))]

resources:
  repositories:
    - repository: self
    - repository: das-platform-building-blocks
      type: github
      name: SkillsFundingAgency/das-platform-building-blocks
      ref: refs/tags/3.0.16
      endpoint: SkillsFundingAgency
    - repository: das-platform-automation
      type: github
      name: SkillsFundingAgency/das-platform-automation
      ref: refs/tags/5.1.20
      endpoint: SkillsFundingAgency
  pipelines:
    - pipeline: das-employer-config
      project: Digital Apprenticeship Service
      source: das-employer-config
      branch: master

stages:
  - stage: Build
    jobs:
      - template: pipeline-templates/job/code-build.yml
        parameters:
          SolutionBaseName: $(SolutionBaseName).Web
          BuildConfiguration: $(BuildConfiguration)
      - template: azure-pipelines-templates/build/job/dacpac-template.yml@das-platform-building-blocks
        parameters:
          SolutionBaseName: $(SolutionBaseName).Database
          SqlProjectPath: src/$(SolutionBaseName).Database/$(SolutionBaseName).Database.sqlproj

  - stage: Deploy_AT
    dependsOn: Build
    displayName: Deploy to AT
    condition: and(succeeded(), eq(variables.Deploy, 'true'))
    variables:
      - group: DevTest Management Resources
      - group: AT DevTest Shared Resources
    jobs:
      - template: pipeline-templates/job/deploy.yml
        parameters:
          Environment: AT
          SolutionBaseName: $(SolutionBaseName).Web
          ServiceConnection: SFA-DAS-DevTest-ARM
          DacPacSolutionBaseName: $(SolutionBaseName).Database

  - stage: Deploy_TEST
    dependsOn: Build
    displayName: Deploy to TEST
    variables:
      - group: DevTest Management Resources
      - group: TEST DevTest Shared Resources
    jobs:
      - template: pipeline-templates/job/deploy.yml
        parameters:
          Environment: TEST
          SolutionBaseName: $(SolutionBaseName).Web
          ServiceConnection: SFA-DAS-DevTest-ARM
          DacPacSolutionBaseName: $(SolutionBaseName).Database

  - stage: Deploy_TEST2
    dependsOn: Build
    displayName: Deploy to TEST2
    variables:
      - group: DevTest Management Resources
      - group: TEST2 DevTest Shared Resources
    jobs:
      - template: pipeline-templates/job/deploy.yml
        parameters:
          Environment: TEST2
          SolutionBaseName: $(SolutionBaseName).Web
          ServiceConnection: SFA-DAS-DevTest-ARM
          DacPacSolutionBaseName: $(SolutionBaseName).Database

  - stage: Deploy_DEMO
    dependsOn: Build
    displayName: Deploy to DEMO
    variables:
      - group: DevTest Management Resources
      - group: DEMO DevTest Shared Resources
    jobs:
      - template: pipeline-templates/job/deploy.yml
        parameters:
          Environment: DEMO
          SolutionBaseName: $(SolutionBaseName).Web
          ServiceConnection: SFA-DAS-DevTest-ARM
          DacPacSolutionBaseName: $(SolutionBaseName).Database

  - stage: Deploy_PP
    dependsOn: Build
    displayName: Deploy to PP
    variables:
      - group: PreProd Management Resources
      - group: PreProd Shared Resources
    jobs:
      - template: pipeline-templates/job/deploy.yml
        parameters:
          Environment: PP
          SolutionBaseName: $(SolutionBaseName).Web
          ServiceConnection: SFA-DIG-PreProd-ARM
          DacPacSolutionBaseName: $(SolutionBaseName).Database
